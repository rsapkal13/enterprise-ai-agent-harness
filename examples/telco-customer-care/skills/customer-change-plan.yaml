id: customer.change_plan
version: 0.1.0
name: Change Customer Plan
description: Prepare a fictional customer plan-change request after consent, eligibility, and price-delta checks.
owner: customer-care-platform
risk_tier: T2
lifecycle_state: active
environment: test
approved_agents:
  - customer-service-agent
input_contract:
  required_fields:
    - customer_reference
    - requested_plan_id
output_contract:
  fields:
    - prepared_request_id
    - confirmation_status
    - approval_status
required_context:
  - customer.summary
  - session.context
  - account.entitlements
tool_bindings:
  - customer.read_limited_profile
  - eligibility.check_plan_change
  - billing.calculate_price_delta
  - order.prepare_plan_change_request
policies:
  - consent.required
  - customer_data.access
  - high_risk.action
workflow_ref: customer.change_plan.workflow
evaluation_requirements:
  - policy_boundary_checks
  - tool_sequence_checks
  - customer_confirmation_checks
evaluation_refs:
  - plan_change_eval_pack
  - plan_change_trajectory_checks
audit_required: true
audit_refs:
  - audit.telco.plan_change.allowed.example
  - audit.telco.plan_change.approval_required.example
tags:
  - fictional
  - plan-change
