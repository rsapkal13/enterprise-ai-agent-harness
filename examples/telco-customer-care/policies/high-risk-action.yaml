id: high_risk.action
version: 0.1.0
name: High Risk Action Control
description: Require additional review for high-impact or elevated-risk customer-care actions.
owner: ai-governance
lifecycle_state: active
environment: test
scope:
  agents:
    - customer-service-agent
  skills:
    - customer.change_plan
    - customer.replace_sim
  tools:
    - order.prepare_plan_change_request
  workflows:
    - customer.change_plan.workflow
  enforcement_points:
    - tool_call
    - workflow_step
applicable_risk_tiers:
  - T2
  - T3
default_decision: require_approval
rules:
  - id: bounded_t2_prepare_request_requires_review
    description: T2 request preparation requires human approval before completion.
    condition:
      field: tool.side_effects
      operator: equals
      value: reversible_write
    decision: require_approval
approval_conditions:
  - field: workflow.customer_confirmation.present
    operator: equals
    value: true
audit_obligations:
  - approval_decision
  - reviewer_role
  - policy_reason
evaluation_refs:
  - plan_change_trajectory_checks
tags:
  - fictional
  - risk
