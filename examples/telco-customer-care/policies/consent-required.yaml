id: consent.required
version: 0.1.0
name: Consent Required
description: Require customer confirmation before preparing a plan-change request.
owner: ai-governance
lifecycle_state: active
environment: test
scope:
  agents:
    - customer-service-agent
  skills:
    - customer.change_plan
  tools:
    - order.prepare_plan_change_request
  workflows:
    - customer.change_plan.workflow
  enforcement_points:
    - skill_invocation
    - workflow_step
applicable_risk_tiers:
  - T2
  - T3
default_decision: require_approval
rules:
  - id: consent_present_allows_progress
    description: Allow progress when current-session consent evidence is present.
    condition:
      field: context.consent.present
      operator: equals
      value: true
    decision: allow
approval_conditions:
  - field: context.consent.present
    operator: not_equals
    value: true
audit_obligations:
  - consent_timestamp
  - consent_channel
  - consent_statement_version
evaluation_refs:
  - plan_change_eval_pack
tags:
  - fictional
  - consent
