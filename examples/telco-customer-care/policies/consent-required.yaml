id: consent.required
version: 0.1.0
name: Consent Required
description: Require customer confirmation before preparing a plan-change request.
owner: ai-governance
lifecycle_state: active
environment: test
scope:
  agents:
    - customer-service-agent
  skills:
    - customer.change_plan
  tools:
    - order.prepare_plan_change_request
  workflows:
    - customer.change_plan.workflow
  enforcement_points:
    - skill_invocation
    - workflow_step
applicable_risk_tiers:
  - T2
  - T3
default_decision: require_approval
rules:
  - id: consent_present_allows_progress
    description: Allow progress when current-session consent evidence is present.
    condition:
      subject:
        agent_id: customer-service-agent
      resource:
        skill_id: customer.change_plan
        workflow_id: customer.change_plan.workflow
      action:
        type: prepare_plan_change_request
      context:
        consent_present: true
        channel:
          - contact-center
          - web
    decision: allow
    obligations:
      - type: emit_audit_event
        description: Capture consent evidence without storing sensitive payloads.
      - type: show_confirmation
        description: Present the approved confirmation manifest before continuing.
approval_conditions:
  - context:
      consent_present: false
    decision: require_approval
audit_obligations:
  - consent_timestamp
  - consent_channel
  - consent_statement_version
evaluation_refs:
  - plan_change_eval_pack
tags:
  - fictional
  - consent
